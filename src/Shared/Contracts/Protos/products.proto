syntax = "proto3";

option csharp_namespace = "Products.Grpc";

package products;

service ProductService {
  rpc CheckStock (CheckStockRequest) returns (CheckStockResponse);
  rpc GetProductDetails (GetProductDetailsRequest) returns (GetProductDetailsResponse);
}

message CheckStockRequest {
  repeated StockCheckItem items = 1;
}

message StockCheckItem {
  string product_id = 1;
  int32 requested_quantity = 2;
}

message CheckStockResponse {
  bool all_available = 1;
  repeated StockCheckResult results = 2;
}

message StockCheckResult {
  string product_id = 1;
  bool is_available = 2;
  int32 available_quantity = 3;
}

message GetProductDetailsRequest {
  string product_id = 1;
}

message GetProductDetailsResponse {
  string product_id = 1;
  string name = 2;
  double unit_price = 3;
  bool is_active = 4;
}
