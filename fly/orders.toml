app = "ms-orders-service"
primary_region = "iad"

[build]
  dockerfile = "src/Services/Orders/Orders.API/Dockerfile"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 512
