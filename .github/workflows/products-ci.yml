name: Products CI

on:
  push:
    paths:
      - 'src/Services/Products/**'
      - 'src/Shared/**'
  pull_request:
    paths:
      - 'src/Services/Products/**'
      - 'src/Shared/**'

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 8 (services)
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Setup .NET 10 (unit tests)
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore MicroservicesSolution.sln

      - name: Build
        run: dotnet build src/Services/Products/Products.API/Products.API.csproj -c Release --no-restore

      - name: Unit Tests
        run: dotnet test src/Services/Products/Products.UnitTests/ --no-restore -v minimal

      - name: Docker Build
        run: docker build -f src/Services/Products/Products.API/Dockerfile -t products-service:${{ github.sha }} .
