services:
  orders-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: orders_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - orders-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d orders_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  products-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: products_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5434:5432"
    volumes:
      - products-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d products_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  auth-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: auth_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5436:5432"
    volumes:
      - auth-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d auth_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  payments-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: payments_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5435:5432"
    volumes:
      - payments-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d payments_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  rabbitmq:
    image: rabbitmq:3-management-alpine
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  jaeger:
    image: jaegertracing/all-in-one:latest
    ports:
      - "16686:16686"
      - "14268:14268"

  orders-service:
    build:
      context: .
      dockerfile: src/Services/Orders/Orders.API/Dockerfile
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__OrdersDb=Host=orders-db;Database=orders_db;Username=postgres;Password=postgres
      - RabbitMQ__Host=rabbitmq
      - RabbitMQ__Username=guest
      - RabbitMQ__Password=guest
      - GrpcClients__Products=http://products-service:8080
      - Jaeger__Endpoint=http://jaeger:14268/api/traces
      - Auth__JwksUri=http://auth-service:8080/.well-known/jwks.json
      - Auth__Issuer=auth-service
      - Auth__Audience=microservices
    ports:
      - "5001:8080"
    depends_on:
      orders-db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  products-service:
    build:
      context: .
      dockerfile: src/Services/Products/Products.API/Dockerfile
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__ProductsDb=Host=products-db;Database=products_db;Username=postgres;Password=postgres
      - RabbitMQ__Host=rabbitmq
      - RabbitMQ__Username=guest
      - RabbitMQ__Password=guest
      - Auth__JwksUri=http://auth-service:8080/.well-known/jwks.json
      - Auth__Issuer=auth-service
      - Auth__Audience=microservices
    ports:
      - "5002:8080"
    depends_on:
      products-db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  auth-service:
    build:
      context: .
      dockerfile: src/Services/Auth/Auth.API/Dockerfile
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__AuthDb=Host=auth-db;Database=auth_db;Username=postgres;Password=postgres
      - Jwt__Issuer=auth-service
      - Jwt__Audience=microservices
      - Jwt__AccessTokenExpiryMinutes=15
      - Jwt__RefreshTokenExpiryDays=7
    ports:
      - "5004:8080"
    depends_on:
      auth-db:
        condition: service_healthy

  payments-service:
    build:
      context: .
      dockerfile: src/Services/Payments/Payments.API/Dockerfile
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__PaymentsDb=Host=payments-db;Database=payments_db;Username=postgres;Password=postgres
      - RabbitMQ__Host=rabbitmq
      - RabbitMQ__Username=guest
      - RabbitMQ__Password=guest
    ports:
      - "5003:8080"
    depends_on:
      payments-db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  api-gateway:
    build:
      context: .
      dockerfile: src/ApiGateway/Dockerfile
    ports:
      - "5000:8080"
    depends_on:
      - orders-service
      - products-service

volumes:
  orders-db-data:
  products-db-data:
  payments-db-data:
  auth-db-data:
